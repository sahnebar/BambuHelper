; =============================================================================
;  Waveshare ESP32-S3-Zero + external ST7789 240x320 (e.g. GMT020-02-8P)
;  Same pinout as [env:esp32s3_zero]; only the panel module is larger.
;  Drives the existing layout_240x320 (CYD/WS200-style) UI.
;  Community / experimental - not part of the official release set.
; =============================================================================
[env:esp32s3_zero_320]
extends = s3_common
board = lolin_s3_mini
build_flags =
    ${s3_common.build_flags}
    -D BOARD_VARIANT=\"esp32s3_zero_320\"
    -D BOARD_IS_S3=1
    -D BOARD_IS_S3_ZERO=1
    -D BOARD_PANEL_320=1
    -D DISPLAY_240x320=1
    -D BOARD_HAS_PSRAM
    -D BACKLIGHT_PIN=13
