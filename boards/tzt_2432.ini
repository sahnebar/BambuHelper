; =============================================================================
;  TZT L1435-2.4 (ESP32 + ST7789V 240x320 + XPT2046 touch)
;  Aliexpress: "TZT ESP32 LVGL 2.4 inch LCD TFT 240*320 With Touch"
;  Same ESP32 + SPI + touch pinout as CYD, but ST7789V driver and BL on GPIO27.
;  Community-maintained build, not part of the official release set.
; =============================================================================
[env:tzt_2432]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 230400
board_build.partitions = min_spiffs.csv
lib_deps =
    ${common.lib_deps}
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
build_flags =
    ; --- Touch (XPT2046 - same pins as CYD) ---
    -D USE_XPT2046=1
    -D TOUCH_CS=33
    -D TOUCH_IRQ=36
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_CLK=25
    -D SPI_TOUCH_FREQUENCY=2500000
    ; --- Layout profile ---
    -D BOARD_IS_TZT_2432=1
    -D DISPLAY_240x320=1
    -D BOARD_VARIANT=\"tzt_2432\"
    -D ENABLE_OTA_AUTO=1
    -D BOARD_LOW_RAM=1
    -D BACKLIGHT_PIN=27
    -D USE_ST7789_INVERT=1
